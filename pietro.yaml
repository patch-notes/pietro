# pietro.yaml — example dev config.
#
# Copy or symlink this as your local `pietro.yaml`. Secrets are pulled from the
# environment; export the variables below before running `pietro serve`.
#
# Generate the random keys with:
#   export PIETRO_COOKIE_KEY=$(openssl rand -hex 32)
#   export PIETRO_API_KEY_PEPPER=$(openssl rand -hex 32)
#   export PIETRO_OIDC_CLIENT_ID="..."
#   export PIETRO_OIDC_CLIENT_SECRET="..."
#   # plus any per-service auth secrets you reference below.

listen: "127.0.0.1:18080"
public_url: "http://localhost:18080"
database_path: "./pietro.db"

cookie_key: "${PIETRO_COOKIE_KEY}"
api_key_pepper: "${PIETRO_API_KEY_PEPPER}"

oidc:
  issuer_url: "https://nextcloud.patchnotes.com"
  client_id: "${PIETRO_OIDC_CLIENT_ID}"
  client_secret: "${PIETRO_OIDC_CLIENT_SECRET}"
  allowed_email_domains: ["patchnotes.com"]
  scopes: ["profile", "email"]

services:
  - id: "serxng"
    display_name: "SearXNG"
    description: "Web search"
    upstream_url: "http://searxng.lan"
    # Optional: seconds before Pietro gives up on the upstream. Default: 60.
    # timeout_secs: 120
    auth:
      kind: bearer
