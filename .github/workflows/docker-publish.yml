# GitHub Actions workflow: build the Pietro container and push it to the
# GitHub Container Registry (ghcr.io).
#
# Trigger:
#   * push to `master`         → publishes `:edge` + `:sha-<short>`
#   * a published GitHub Release → publishes `:X.Y.Z`, `:X.Y`, and `:latest`
#                                (the `:latest` tag only for non-prereleases)
#   * manual `workflow_dispatch`
#
# Versioned images ship on release *publication* (not raw tag push), so the
# container image and the binary artifacts (release.yml) come out of the same
# event and can't double-fire.
#
# The image is built from the repo's three-stage Dockerfile (frontend →
# musl backend → FROM scratch) for both linux/amd64 and linux/arm64, matching
# Pietro's multi-arch story. Both base images (node:20-alpine, rust:1-alpine)
# ship both arches, and buildx + QEMU handle the foreign-arch leg.
#
# Secrets: NONE beyond the automatically-injected `GITHUB_TOKEN`, which is
# scoped to this repo and used only to authenticate to ghcr.io. No PATs, no
# registry passwords, nothing that could leak.

name: docker-publish

on:
  push:
    branches:
      - master
  release:
    types: [published]
  workflow_dispatch:

env:
  # ghcr.io/<owner>/<repo> — github.repository is already lowercase here.
  IMAGE_NAME: ghcr.io/${{ github.repository }}

permissions:
  contents: read
  packages: write # required to push to ghcr.io under this repo's namespace

jobs:
  build-and-push:
    name: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU lets the amd64 runner build the arm64 leg via emulation.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in to ghcr.io using the ephemeral, repo-scoped GITHUB_TOKEN.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Derive tags + OCI labels from the event. On a `release` event
      # github.ref is refs/tags/<tag>, so the semver patterns extract the
      # version cleanly. `:latest` is applied only for a published,
      # non-prerelease release — prereleases (v1.2.3-rc1) never move latest.
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-
            type=edge,branch=master
            type=raw,value=latest,enable=${{ github.event_name == 'release' && github.event.release.prerelease == false }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
